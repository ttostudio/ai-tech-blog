name: product-ai-tech-blog

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_tech_blog
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_tech_blog"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:-changeme}@postgres:5432/ai_tech_blog
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: "3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PUBLIC_API_URL: http://backend:3000/api
      HOST: "0.0.0.0"
    expose:
      - "4321"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4321/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "3100:3100"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  caddy_data:
  caddy_config:
